services:
  postgres:
    container_name: StabilizerIndexer_DB
    image: postgres:17
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stabilizer_indexer

volumes:
  postgres_data: